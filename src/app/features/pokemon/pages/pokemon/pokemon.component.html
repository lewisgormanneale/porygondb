<div class="pokemon-page">
  @if (pokemonStore.isLoading()) {
    <div class="loading-container">
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    </div>
  }
  @if (pokemonStore.isCompleted() && pokemonStore.selectedEntity()) {
    <div class="pokemon-container">
      <div class="main-info">
        <section class="summary-info">
          <pokemon-summary></pokemon-summary>
        </section>
        <section class="tabs-info">
          <mat-tab-group animationDuration="0ms">
            <mat-tab label="Details">
              <ng-template matTabContent>
                <pokemon-details-tab></pokemon-details-tab>
              </ng-template>
            </mat-tab>
            <mat-tab label="Stats">
              <ng-template matTabContent>
                <pokemon-stats-tab></pokemon-stats-tab>
              </ng-template>
            </mat-tab>
          </mat-tab-group>
        </section>
      </div>
      <section class="additional-info">
        <pokemon-additional-info></pokemon-additional-info>
      </section>
      <section class="evolution-info">
        <evolution-line></evolution-line>
      </section>
    </div>
  }
</div>
