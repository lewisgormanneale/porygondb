<mat-drawer-container class="app-shell" autosize>
  <mat-drawer class="app-drawer" [mode]="isMobile() ? 'over' : 'side'" [opened]="isDrawerOpen()">
    <div class="drawer-content">
      <div class="drawer-header">
        <span class="label-large">Menu</span>
        @if (isMobile()) {
          <button mat-icon-button aria-label="Close menu" (click)="closeMenu()">
            <mat-icon>close</mat-icon>
          </button>
        }
      </div>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="drawer-search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input
          type="text"
          matInput
          placeholder="Search Pokémon..."
          [(ngModel)]="searchValue"
          (input)="onSearchInput()"
          [matAutocomplete]="auto"
        />
        <mat-autocomplete
          #auto="matAutocomplete"
          (optionSelected)="onPokemonSelected($event)"
          autoActiveFirstOption
        >
          @for (option of filteredPokemonOptions(); track option.name) {
            <mat-option [value]="option.name">{{ option.displayName }}</mat-option>
          }
        </mat-autocomplete>
      </mat-form-field>

      <mat-nav-list>
        <a
          mat-list-item
          [routerLink]="['/pokedex', 'national', 'national']"
          routerLinkActive="active-nav-item"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="onNavigationItemClick()"
        >
          <mat-icon matListItemIcon>catching_pokemon</mat-icon>
          <span matListItemTitle>Pokedex</span>
        </a>
        <a
          mat-list-item
          [routerLink]="['/abilities']"
          routerLinkActive="active-nav-item"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="onNavigationItemClick()"
        >
          <mat-icon matListItemIcon>auto_fix_high</mat-icon>
          <span matListItemTitle>Abilities</span>
        </a>
      </mat-nav-list>
    </div>
  </mat-drawer>

  <mat-drawer-content>
    <mat-toolbar class="header">
      <div class="header-content">
        <button mat-icon-button aria-label="Toggle menu" (click)="toggleMenu()" class="menu-button">
          <mat-icon>menu</mat-icon>
        </button>
        <a [routerLink]="['/']" aria-label="Home" class="title" routerLinkActive="active">
          <img
            alt="Porygon"
            height="60"
            ngSrc="assets/images/porygon-gen-3.png"
            priority
            width="60"
          />
          <span>PorygonDB</span>
        </a>
        <span class="spacer"></span>
        <div class="toolbar-actions">
          <button
            (click)="themeStore.toggleTheme()"
            aria-label="Change Application Theme"
            mat-icon-button
          >
            @if (themeStore.isDarkTheme()) {
              <mat-icon>light_mode</mat-icon>
            } @else {
              <mat-icon>dark_mode</mat-icon>
            }
          </button>
          <a
            aria-label="GitHub Repository"
            href="https://github.com/lewisgormanneale/porygondb"
            mat-icon-button
            target="_blank"
          >
            <mat-icon svgIcon="github"></mat-icon>
          </a>
        </div>
      </div>
    </mat-toolbar>

    <main>
      <div class="page-container" [class.page-container-full-bleed]="isPokedexListRoute()">
        <router-outlet />
      </div>
    </main>
  </mat-drawer-content>
</mat-drawer-container>
