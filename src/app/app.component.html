<mat-toolbar class="header">
  <div class="header-content">
    <a [routerLink]="['/']" aria-label="Home" class="title" routerLinkActive="active">
      <img alt="Porygon" height="60" ngSrc="assets/images/porygon-gen-3.png" priority width="60" />
      <span>PorygonDB</span>
    </a>
    <span class="spacer"></span>
    <div class="search-container">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input
          type="text"
          matInput
          placeholder="Search Pokémon..."
          [(ngModel)]="searchValue"
          (input)="onSearchInput()"
          [matAutocomplete]="auto"
        />
        <mat-autocomplete
          #auto="matAutocomplete"
          (optionSelected)="onPokemonSelected($event)"
          autoActiveFirstOption
        >
          @for (option of filteredPokemonOptions(); track option.name) {
            <mat-option [value]="option.name">{{ option.displayName }}</mat-option>
          }
        </mat-autocomplete>
      </mat-form-field>
    </div>
    <div class="toolbar-actions">
      <button
        (click)="themeStore.toggleTheme()"
        aria-label="Change Application Theme"
        mat-icon-button
      >
        @if (themeStore.isDarkTheme()) {
          <mat-icon>light_mode</mat-icon>
        } @else {
          <mat-icon>dark_mode</mat-icon>
        }
      </button>
      <a
        aria-label="GitHub Repository"
        href="https://github.com/lewisgormanneale/porygondb"
        mat-icon-button
        target="_blank"
      >
        <mat-icon svgIcon="github"></mat-icon>
      </a>
    </div>
  </div>
</mat-toolbar>
<main>
  <div class="page-container">
    <router-outlet />
  </div>
</main>
